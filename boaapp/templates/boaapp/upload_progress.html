{% extends 'boaapp/base_generic.html' %} {% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Processing Upload</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="{% static 'css/index.css' %}?v={{ timestamp }}"
    />
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  </head>
  <body>
    {% block content %}
    <div class="container custom-container">
      <h2>Processing Upload</h2>

      <!-- The full file name (hidden input) -->
      <input type="hidden" id="file_name" value="{{ file_name }}" />

      <!-- Display the extracted part of the file name here -->
      <h4 id="displayedFileName">Uploading: {{ file_name }}</h4>
    </div>
    {% endblock %}

    <script>
      // Function to extract part of the filename between '-' and '.'
      function extractFileName() {
        const fileName = document.getElementById("file_name").value;

        const hyphenIndex = fileName.indexOf("-");
        const dotIndex = fileName.lastIndexOf(".");

        if (hyphenIndex !== -1 && dotIndex !== -1 && dotIndex > hyphenIndex) {
          const extractedName = fileName
            .substring(hyphenIndex + 1, dotIndex)
            .trim();
          document.getElementById(
            "displayedFileName"
          ).innerText = `Uploading: ${extractedName}`;
        } else {
          document.getElementById(
            "displayedFileName"
          ).innerText = `Uploading: ${fileName.trim()}`;
        }
      }

      // Function to extract the title from audio filenames
      function extractAudioTitle(audioFileName) {
        const doubleUnderscoreIndex = audioFileName.indexOf("__");
        const mp3Index = audioFileName.lastIndexOf(".mp3");

        if (doubleUnderscoreIndex !== -1 && mp3Index !== -1) {
          const extractedTitle = audioFileName
            .substring(doubleUnderscoreIndex + 2, mp3Index)
            .replace(/_/g, " ")
            .trim();
          return extractedTitle;
        } else {
          return audioFileName; // Return full name if pattern not found
        }
      }

      // Call the extraction function on page load
      extractFileName();

      // Existing progress update logic
      function updateProgress() {
        const fileName = document.getElementById("file_name").value;

        fetch(`/upload/progress/${encodeURIComponent(fileName)}/`)
          .then((response) => {
            if (!response.ok) {
              throw new Error("Network response was not ok");
            }
            return response.json();
          })
          .then((data) => {
            const progressBar = document.getElementById("uploadProgress");
            progressBar.value = data.progress; // Update <progress> value
            document.getElementById("progressPercentage").innerText =
              data.progress + "%"; // Update percentage text

            // Parse logs for audio titles
            const logsArray = data.logs.split("\n").map((log) => {
              if (log.startsWith("Audio content written to")) {
                const audioFileName = log.split(" ")[4]; // Extract the file name part
                const formattedTitle = extractAudioTitle(audioFileName);
                return `Audio processed: ${formattedTitle}`; // Display the formatted title in logs
              }
              return log; // For non-audio logs, return as is
            });

            // Update logs in the UI with the processed audio titles
            document.getElementById("logs").textContent = logsArray.join("\n");

            if (data.progress < 100) {
              setTimeout(updateProgress, 1000); // Continue polling
            } else {
              setTimeout(() => {
                window.location.href = "/upload/success/"; // Redirect on completion
              }, 2000);
            }
          })
          .catch((error) => console.error("Error updating progress:", error));
      }

      updateProgress(); // Start progress updates
    </script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </body>
</html>
