{% extends 'boaapp/base_generic.html' %} {% load static %}

{% block title %}thenumerix | Sign In{% endblock %}

{% block extra_head %}
<style>
/* ══════════════════════════════════════════════════════
   LOGIN PAGE — Clean sign-in card
   ══════════════════════════════════════════════════════ */
:root{
  --ln-blue:#3b82f6;--ln-violet:#8b5cf6;
  --ln-surface:#fff;
  --ln-border:rgba(0,0,0,.07);
  --ln-muted:#6b7280;
  --ln-shadow-lg:0 8px 32px rgba(0,0,0,.10);
}
[data-theme="dark"]{
  --ln-surface:#1a1d2e;
  --ln-border:rgba(255,255,255,.08);
  --ln-muted:#94a3b8;
  --ln-shadow-lg:0 8px 32px rgba(0,0,0,.4);
}
@keyframes lnFadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.ln-wrap{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:2rem 1rem;
}
.ln-card{
  width:100%;max-width:400px;border-radius:18px;
  border:1px solid var(--ln-border);background:var(--ln-surface);
  box-shadow:var(--ln-shadow-lg);
  padding:2.2rem 2rem;position:relative;overflow:hidden;
  animation:lnFadeUp .4s ease both;
}
.ln-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--ln-blue),var(--ln-violet));
}
.ln-logo{text-align:center;margin-bottom:1.4rem}
.ln-logo img{height:56px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.1))}
.ln-title{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:.2rem}
.ln-sub{font-size:.78rem;color:var(--ln-muted);text-align:center;margin-bottom:1.5rem}
.ln-card .form-control{
  border-radius:10px;border:1px solid var(--ln-border);
  font-size:.88rem;padding:.55rem .85rem;
  transition:border-color .2s,box-shadow .2s;
}
[data-theme="dark"] .ln-card .form-control{background:rgba(255,255,255,.06);color:inherit}
.ln-card .form-control:focus{
  border-color:rgba(59,130,246,.5);
  box-shadow:0 0 0 3px rgba(59,130,246,.1);
}
.ln-card .form-label{font-size:.78rem;font-weight:600;color:var(--ln-muted);margin-bottom:.25rem}
.ln-card .btn-primary{
  border-radius:10px;font-weight:700;padding:.6rem;font-size:.9rem;
  background:linear-gradient(135deg,var(--ln-blue),var(--ln-violet));
  border:none;box-shadow:0 4px 14px rgba(59,130,246,.25);
  transition:opacity .2s,transform .2s;
}
.ln-card .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.ln-footer{font-size:.76rem;text-align:center;color:var(--ln-muted);margin-top:1rem}
.ln-footer a{font-weight:600}
</style>
{% endblock %}

{% block content %}
<div class="ln-wrap">
  <div class="ln-card">
    <div class="ln-logo">
      <img src="{% static 'logo.png' %}" alt="thenumerix Logo" />
    </div>
    <h1 class="ln-title">Sign In</h1>
    <p class="ln-sub">Portfolio · Education · Technical Work · Apps</p>

    <form method="POST" class="login-form">
      {% csrf_token %}
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" autocomplete="username" placeholder="Enter username" />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <p class="ln-footer">
      Don't have an account? <a href="{% url 'register' %}">Register</a>
    </p>
  </div>
</div>
{% endblock %}
