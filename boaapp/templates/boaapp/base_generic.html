{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}thenumerix | Home{% endblock %}</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="{% static 'css/index.css' %}?v={{ timestamp }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon" />
  </head>

  <body data-theme="light">
    <nav class="navbar navbar-expand-lg fixed-top">
      <a class="navbar-brand" href="{% url 'login' %}">
        <img src="{% static 'logo.png' %}" alt="Logo" height="50" />
      </a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link btn" href="{% url 'login' %}">Home</a>
          </li>
          {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link btn" href="{% url 'logout' %}">Logout</a>
          </li>
          {% else %}
          <li class="nav-item">
            <a class="nav-link btn" href="{% url 'login' %}">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link btn" href="{% url 'register' %}">Register</a>
          </li>
          {% endif %}
          <li class="nav-item d-flex align-items-center px-2">
            <div
              style="
                width: 1px;
                height: 24px;
                background-color: rgba(255, 255, 255, 0.5);
              "
            ></div>
          </li>
          <li class="nav-item">
            <button class="nav-link btn" id="theme-toggle-btn">
              🌙 Dark Mode
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <div class="container">{% block content %}{% endblock %}</div>

    <div id="theme-transition-overlay"></div>
    <div id="theme-toast" class="toast-message"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const toggleBtn = document.getElementById("theme-toggle-btn");
        const overlay = document.getElementById("theme-transition-overlay");

        function updateThemeLabel(theme) {
          toggleBtn.textContent =
            theme === "dark" ? "☀️ Light Mode" : "🌙 Dark Mode";
        }

        function setTheme(theme) {
          document.body.setAttribute("data-theme", theme);
          localStorage.setItem("theme", theme);
          updateThemeLabel(theme);

          overlay.classList.remove("flash-dark", "flash-light");
          overlay.classList.add(
            theme === "light" ? "flash-light" : "flash-dark"
          );
          overlay.style.opacity = "1";
          setTimeout(() => {
            overlay.style.opacity = "0";
          }, 400);
        }

        function toggleTheme() {
          const current =
            document.documentElement.getAttribute("data-theme") || "light";
          setTheme(current === "light" ? "dark" : "light");
        }

        const initialTheme =
          localStorage.getItem("theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        setTheme(initialTheme);
        toggleBtn.addEventListener("click", toggleTheme);
      });
    </script>
  </body>
</html>
