name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  django-check:
    name: Django System Check
    runs-on: ubuntu-latest
    needs: lint
    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-real
      DJANGO_DEBUG: "True"
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: ":memory:"
      DB_PASSWORD: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python manage.py check --deploy 2>&1 || true
      - run: python manage.py check

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install bandit[toml]
      - run: bandit -r boaapp/ boa/ -x "*/tests.py,*/test_*" --severity-level medium -f json || true
