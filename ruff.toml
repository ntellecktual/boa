# BOA — Ruff Linter & Formatter Configuration
# https://docs.astral.sh/ruff/

target-version = "py312"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "S",    # flake8-bandit (security)
    "T20",  # flake8-print
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "S101",   # assert used (fine in tests)
    "S105",   # hardcoded password (false positives on variable names)
    "S106",   # hardcoded password argument
    "T201",   # print found (we use logging, but some scripts need print)
    "B905",   # zip strict (not always needed)
]

[lint.per-file-ignores]
"**/migrations/*.py" = ["E", "W", "F", "I", "B", "C4", "UP", "S", "T20", "SIM", "TCH"]
"**/tests.py" = ["S101"]
"**/test_*.py" = ["S101"]
"manage.py" = ["T201"]

[lint.isort]
known-first-party = ["boa", "boaapp"]

[format]
quote-style = "single"
indent-style = "space"
